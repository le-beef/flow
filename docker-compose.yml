services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lebeef
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["127.0.0.1:5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
  evolution:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@evolution-postgres:5432/evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_LOCAL_ENABLED: "false"
    ports: ["127.0.0.1:8080:8080"]
    depends_on: [evolution-postgres, redis]
    volumes: [evolution_instances:/evolution/instances]
  evolution-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: [evolution_postgres_data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
volumes:
  postgres_data:
  evolution_postgres_data:
  redis_data:
  evolution_instances:
